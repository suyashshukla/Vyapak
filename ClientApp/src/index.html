<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Vyapak AI | Professional Local LLM Bridge</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">

  <!-- Open Graph / Social Media -->
  <meta property="og:type" content="website">
  <meta property="og:url" content="/">
  <meta property="og:title" content="Vyapak AI | Secure Local-First AI Bridge">
  <meta property="og:description" content="A high-performance, professional bridge for local Ollama models. Privacy-first AI for developers and teams.">
  <meta property="og:image" content="https://vyapak.codiebe.com/social-image.png">

  <!-- Twitter -->
  <meta property="twitter:card" content="summary_large_image">
  <meta property="twitter:title" content="Vyapak AI | Local Ollama Bridge">
  <meta property="twitter:description" content="Secure and modern web bridge for local Ollama models. Privacy-first AI for developers and teams.">
  <meta property="twitter:image" content="https://vyapak.codiebe.com/social-image.png">

  <style>
    .splash-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      background-color: #f8fafc;
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
    }
    .splash-logo {
      width: 80px;
      height: 80px;
      background-color: #7c3aed;
      border-radius: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 20px 25px -5px rgba(124, 58, 237, 0.2);
      margin-bottom: 24px;
      animation: pulse 2s infinite cubic-bezier(0.4, 0, 0.6, 1);
    }
    .splash-logo svg {
      width: 42px;
      height: 42px;
      color: white;
    }
    .splash-text {
      font-size: 28px;
      font-weight: 800;
      color: #0f172a;
      letter-spacing: -0.04em;
    }
    .splash-sub {
      font-size: 11px;
      font-weight: 700;
      color: #94a3b8;
      margin-top: 10px;
      text-transform: uppercase;
      letter-spacing: 0.2em;
    }
    @keyframes pulse {
      0% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.08); opacity: 0.9; }
      100% { transform: scale(1); opacity: 1; }
    }
  </style>
</head>
<body>
  <app-root>
    <div class="splash-container">
      <div class="splash-logo">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M13 10V3L4 14h7v7l9-11h-7z"></path>
        </svg>
      </div>
      <div class="splash-text">Vyapak <span style="color: #7c3aed;">AI</span></div>
      <div class="splash-sub">Bootstrapping Interface</div>
    </div>
  </app-root>
</body>
</html>
